<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Nozis</title>
	<meta name="description" content="Nozis — Premium Web Proxy" />
	<link rel="preconnect" href="https://fonts.googleapis.com" />
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
	<link rel="stylesheet" href="/index.css" />
	<script src="/uv/uv.bundle.js" defer></script>
	<script src="/uv/uv.config.js" defer></script>
	<script src="/search.js" defer></script>
	<script src="/register-sw.js" defer></script>
	<script src="/baremux/index.js" defer></script>
	<script src="/index.js" defer></script>
</head>
<body>
	<!-- Animated Background Canvas -->
	<canvas id="bg-canvas"></canvas>

	<!-- Proxy iframe (hidden until navigation) -->
	<iframe id="uv-frame" title="Proxy Frame"></iframe>

	<!-- Iframe navbar (shown when proxy is active) -->
	<div id="uv-nav" class="uv-nav hidden">
		<div class="uv-nav-left">
			<button id="uv-nav-back" class="uv-nav-btn" title="Go Back">
				<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
			</button>
			<button id="uv-nav-forward" class="uv-nav-btn" title="Go Forward">
				<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
			</button>
			<button id="uv-nav-reload" class="uv-nav-btn" title="Reload">
				<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"></polyline><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path></svg>
			</button>
		</div>
		<div class="uv-nav-url" id="uv-nav-url"></div>
		<div class="uv-nav-right">
			<button id="uv-nav-close" class="uv-nav-btn uv-nav-close" title="Close Proxy">
				<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
			</button>
		</div>
	</div>

	<!-- Main Landing UI -->
	<main id="landing" class="landing">
		<div class="hero">
			<!-- Logo / Branding -->
			<div class="brand">
				<div class="brand-icon">
					<svg width="48" height="48" viewBox="0 0 48 48" fill="none">
						<defs>
							<linearGradient id="logo-grad" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
								<stop offset="0%" stop-color="#a855f7" />
								<stop offset="50%" stop-color="#6366f1" />
								<stop offset="100%" stop-color="#06b6d4" />
							</linearGradient>
						</defs>
						<rect x="4" y="4" width="40" height="40" rx="12" fill="url(#logo-grad)" opacity="0.15"/>
						<path d="M16 18L24 12L32 18V30L24 36L16 30V18Z" stroke="url(#logo-grad)" stroke-width="2.5" fill="none"/>
						<circle cx="24" cy="24" r="4" fill="url(#logo-grad)"/>
						<line x1="24" y1="12" x2="24" y2="20" stroke="url(#logo-grad)" stroke-width="1.5" opacity="0.5"/>
						<line x1="24" y1="28" x2="24" y2="36" stroke="url(#logo-grad)" stroke-width="1.5" opacity="0.5"/>
						<line x1="16" y1="18" x2="20" y2="22" stroke="url(#logo-grad)" stroke-width="1.5" opacity="0.5"/>
						<line x1="28" y1="26" x2="32" y2="30" stroke="url(#logo-grad)" stroke-width="1.5" opacity="0.5"/>
					</svg>
				</div>
				<h1 class="brand-name">Nozis</h1>
			</div>
			<p class="brand-tagline">Browse without boundaries.</p>

			<!-- Search / URL Form -->
			<form id="uv-form" class="search-form" autocomplete="off">
				<div class="search-bar">
					<div class="search-icon">
						<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
					</div>
					<input
						id="uv-address"
						type="text"
						placeholder="Search the web or enter a URL..."
						required
						spellcheck="false"
						autocomplete="off"
					/>
					<select id="uv-search-engine" class="search-engine-select">
						<option value="https://www.google.com/search?q=%s">Google</option>
						<option value="https://duckduckgo.com/?q=%s">DuckDuckGo</option>
						<option value="https://www.bing.com/search?q=%s">Bing</option>
						<option value="https://search.brave.com/search?q=%s">Brave</option>
					</select>
					<button type="submit" class="search-submit" id="uv-submit">
						<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
					</button>
				</div>
				<!-- Error display -->
				<div id="uv-error-container" class="error-container hidden">
					<p id="uv-error" class="error-text"></p>
					<pre id="uv-error-code" class="error-code"></pre>
				</div>
			</form>

			<!-- Quick Links -->
			<div class="quick-links">
				<button class="quick-link" data-url="https://www.google.com">
					<div class="quick-link-icon" style="background: linear-gradient(135deg, #4285f4, #34a853);">G</div>
					<span>Google</span>
				</button>
				<button class="quick-link" data-url="https://www.youtube.com">
					<div class="quick-link-icon" style="background: linear-gradient(135deg, #ff0000, #cc0000);">▶</div>
					<span>YouTube</span>
				</button>
				<button class="quick-link" data-url="https://discord.com/app">
					<div class="quick-link-icon" style="background: linear-gradient(135deg, #5865f2, #7b83f5);">D</div>
					<span>Discord</span>
				</button>
				<button class="quick-link" data-url="https://www.reddit.com">
					<div class="quick-link-icon" style="background: linear-gradient(135deg, #ff4500, #ff6833);">R</div>
					<span>Reddit</span>
				</button>
				<button class="quick-link" data-url="https://twitter.com">
					<div class="quick-link-icon" style="background: linear-gradient(135deg, #1a1a2e, #444);">𝕏</div>
					<span>X</span>
				</button>
				<button class="quick-link" data-url="https://www.tiktok.com">
					<div class="quick-link-icon" style="background: linear-gradient(135deg, #000, #25f4ee);">T</div>
					<span>TikTok</span>
				</button>
			</div>
		</div>

		<!-- Footer -->
		<footer class="footer">
			<span>Powered by <a href="https://github.com/titaniumnetwork-dev/Ultraviolet" target="_blank" rel="noopener">Ultraviolet</a></span>
			<span class="footer-sep">·</span>
			<span><a href="https://titaniumnetwork.org" target="_blank" rel="noopener">Titanium Network</a></span>
		</footer>
	</main>
</body>
</html>
